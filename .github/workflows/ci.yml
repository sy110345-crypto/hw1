name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  # 1. 빌드 및 푸시 작업 (기본 이미지 빌드는 Ubuntu 환경에서 실행)
  docker:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cat-dog-api
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 로컬 컴퓨터(Self-hosted Runner)에서의 배포 작업
  deploy:
    needs: docker
    runs-on: self-hosted
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest image and Restart container
        shell: powershell
        run: |
          # 1. 최신 이미지 받아오기
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cat-dog-api:latest
          
          # 2. 기존 컨테이너 중지 및 삭제 (PowerShell 문법)
          docker stop cat-dog-api-container 2>$null
          docker rm cat-dog-api-container 2>$null
          
          # 3. 새 컨테이너 실행 (줄바꿈은 백틱 ` 사용)
          docker run -d `
            --name cat-dog-api-container `
            -p 8080:8080 `
            --restart always `
            ${{ secrets.DOCKERHUB_USERNAME }}/cat-dog-api:latest
          
          # 4. 사용하지 않는 오래된 이미지 정리
          docker image prune -f
